<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sugar News</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #20242a;
      --muted: #667085;
      --line: #d9dee7;
      --accent: #2457c5;
      --bull: #c9342f;
      --bear: #16845b;
      --neutral: #5f6673;
      --limited: #9aa3af;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
      overflow-x: hidden;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .wrap {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
    }
    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      padding: 28px 0 20px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .actions {
      display: flex;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    select {
      min-width: 180px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 9px 34px 9px 12px;
      font-size: 14px;
      color: var(--text);
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      min-height: 39px;
      padding: 9px 13px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }
    button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }
    button:disabled {
      cursor: wait;
      color: var(--muted);
      background: #f2f4f7;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .download-btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }
    main { padding: 22px 0 36px; }
    .country {
      padding: 20px 0 12px;
      border-bottom: 1px solid var(--line);
    }
    .country:first-child { padding-top: 0; }
    .country h2 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }
    .items {
      display: grid;
      gap: 10px;
    }
    .metric-card {
      margin: 0 0 12px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      max-width: 100%;
      overflow: hidden;
    }
    .metric-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 10px;
    }
    .metric-head h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }
    .metric-note {
      color: var(--muted);
      font-size: 13px;
    }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    .metric-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .metric-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-width: 0;
    }
    .metric-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 17px;
      font-weight: 700;
      word-break: break-word;
    }
    .metric-sub {
      margin-top: 6px;
      color: #364152;
      font-size: 13px;
    }
    .metric-change.up { color: var(--bull); }
    .metric-change.down { color: var(--bear); }
    .metric-change.flat, .metric-change.unknown { color: var(--neutral); }
    .metric-source {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .metric-source a {
      color: var(--accent);
      text-decoration: none;
    }
    .metric-source a:hover { text-decoration: underline; }
    .brazil-metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: stretch;
    }
    .brazil-metric-card {
      min-width: 0;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .brazil-metric-title {
      margin: 0;
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      text-align: center;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 700;
      background: #fbfcfe;
    }
    .brazil-metric-table {
      width: 100%;
      max-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
      line-height: 1.25;
    }
    .brazil-metric-table th,
    .brazil-metric-table td {
      border-bottom: 1px solid var(--line);
      padding: 5px 7px;
      vertical-align: middle;
      white-space: nowrap;
    }
    .brazil-metric-table tr:last-child th,
    .brazil-metric-table tr:last-child td {
      border-bottom: 0;
    }
    .brazil-metric-table th {
      width: 34%;
      text-align: left;
      color: var(--text);
      font-weight: 500;
    }
    .brazil-metric-table td {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }
    .brazil-metric-main {
      font-weight: 700;
    }
    .metric-change.up { color: var(--bull); }
    .metric-change.down { color: var(--bear); }
    .metric-change.flat, .metric-change.unknown { color: var(--neutral); }
    .metric-change.na { color: var(--limited); }
    .brazil-metric-foot {
      margin-top: auto;
      padding: 6px 8px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .brazil-metric-foot a {
      color: var(--accent);
      text-decoration: none;
    }
    .brazil-metric-foot a:hover { text-decoration: underline; }
    article {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 0.36fr);
      gap: 14px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .news {
      margin: 0;
      font-size: 15px;
    }
    .source {
      display: inline-block;
      margin-top: 8px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      word-break: break-word;
    }
    .source:hover { text-decoration: underline; }
    .impact {
      border-left: 3px solid var(--limited);
      padding-left: 12px;
      color: #364152;
      font-size: 14px;
    }
    .impact strong {
      display: inline-block;
      margin-bottom: 4px;
    }
    .impact.bull { border-color: var(--bull); }
    .impact.bull strong { color: var(--bull); }
    .impact.bear { border-color: var(--bear); }
    .impact.bear strong { color: var(--bear); }
    .impact.neutral { border-color: var(--neutral); }
    .impact.neutral strong { color: var(--neutral); }
    .impact.limited { border-color: var(--limited); }
    .impact.limited strong { color: var(--limited); }
    .error {
      display: none;
      padding: 16px;
      border: 1px solid #e0a4a4;
      border-radius: 8px;
      background: #fff8f8;
      color: #8a2525;
    }
    .export-stage {
      position: fixed;
      left: -20000px;
      top: 0;
      z-index: -1;
      width: 1120px;
      background: #fff;
      color: var(--text);
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }
    .export-stage .export-title {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .export-stage .export-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 760px) {
      .wrap {
        width: calc(100vw - 24px);
        max-width: 1120px;
      }
      .top { grid-template-columns: 1fr; align-items: start; padding-top: 22px; }
      .actions { width: 100%; justify-content: stretch; }
      .actions label { flex: 1 1 100%; }
      .download-btn { width: 100%; justify-content: center; }
      article { grid-template-columns: 1fr; }
      .metric-head { display: grid; }
      .metric-grid { grid-template-columns: 1fr; }
      .brazil-metric-grid { grid-template-columns: 1fr; }
      .brazil-metric-table th,
      .brazil-metric-table td {
        padding: 6px 8px;
        white-space: normal;
      }
      .brazil-metric-table td,
      .brazil-metric-foot,
      .brazil-metric-foot a {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      h1 { font-size: 24px; }
      select { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div>
        <h1>Sugar News</h1>
        <div class="meta">
          <span id="newsDate"></span>
          <span id="updatedAt"></span>
        </div>
      </div>
      <div class="actions">
        <label>
          历史日期
          <select id="dateSelect" aria-label="选择历史日期"></select>
        </label>
        <button id="downloadImage" class="download-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M12 15V3"></path>
          </svg>
          <span>下载为图片</span>
        </button>
      </div>
    </div>
  </header>
  <main class="wrap">
    <div id="error" class="error"></div>
    <div id="content"></div>
  </main>
  <script src="/public/sugar-news/vendor/html2canvas.min.js"></script>
  <script>
    const indexUrl = "/public/sugar-news/data/index.json";
    const contentEl = document.getElementById("content");
    const selectEl = document.getElementById("dateSelect");
    const dateEl = document.getElementById("newsDate");
    const updatedEl = document.getElementById("updatedAt");
    const errorEl = document.getElementById("error");
    const downloadBtn = document.getElementById("downloadImage");
    const downloadBtnText = downloadBtn.querySelector("span");
    let currentPayload = null;

    function fresh(url) {
      return `${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}`;
    }

    function cnDate(iso) {
      const [year, month, day] = iso.split("-");
      return `${year}年${month}月${day}日`;
    }

    function cnTime(iso) {
      if (!iso) return "";
      const date = new Date(iso);
      return new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(date);
    }

    function impactClass(type) {
      if (type === "偏多糖价") return "bull";
      if (type === "偏空糖价") return "bear";
      if (type === "利多") return "bull";
      if (type === "利空") return "bear";
      if (type === "中性") return "neutral";
      return "limited";
    }

    function valueText(value, suffix = "") {
      if (value === null || value === undefined || value === "") return "数据待更新";
      return `${value}${suffix}`;
    }

    function signedText(value, suffix = "") {
      if (value === null || value === undefined || value === "") return "数据待更新";
      const number = Number(value);
      if (Number.isNaN(number)) return `${value}${suffix}`;
      return `${number > 0 ? "+" : ""}${value}${suffix}`;
    }

    function isBrazilCountry(name) {
      return name === "巴西" || name === "\uFFFD\uFFFD\uFFFD\uFFFD";
    }

    function isIndiaCountry(name) {
      return name === "印度" || name === "ӡ��";
    }

    function formatNumber(value, digits = 2) {
      if (value === null || value === undefined || value === "") return "数据待更新";
      const number = Number(value);
      if (!Number.isFinite(number)) return String(value);
      return number.toFixed(digits);
    }

    function changeClass(value) {
      if (value === null || value === undefined || value === "") return "na";
      const number = Number(value);
      if (!Number.isFinite(number)) return "na";
      if (number > 0) return "up";
      if (number < 0) return "down";
      return "flat";
    }

    function changeArrow(value) {
      if (value === null || value === undefined || value === "") return "";
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      if (number > 0) return "▲ ";
      if (number < 0) return "▼ ";
      return "— ";
    }

    function signedFixed(value, digits, unit = "") {
      if (value === null || value === undefined || value === "") return "数据不足";
      const number = Number(value);
      if (!Number.isFinite(number)) return String(value);
      const sign = number > 0 ? "+" : "";
      return `${sign}${number.toFixed(digits)}${unit}`;
    }

    function pctText(value) {
      if (value === null || value === undefined || value === "" || !Number.isFinite(Number(value))) return "不适用";
      return signedFixed(value, 2, "%");
    }

    function signTransition(previous, current) {
      const prev = Number(previous);
      const curr = Number(current);
      if (!Number.isFinite(prev) || !Number.isFinite(curr)) return "";
      if (prev < 0 && curr > 0) return "由贴水转升水";
      if (prev > 0 && curr < 0) return "由升水转贴水";
      return "";
    }

    function plainFixed(value, digits, unit = "") {
      if (value === null || value === undefined || value === "") return "数据待更新";
      const number = Number(value);
      if (!Number.isFinite(number)) return String(value);
      return `${number.toFixed(digits)}${unit}`;
    }

    function metricMainValue(metric, digits, unit, valueKey, keepSign = false) {
      if (!metric || metric.status !== "ok") return metric && metric.statusText ? metric.statusText : "数据待更新";
      const raw = metric[valueKey];
      if (raw === null || raw === undefined || raw === "") return "数据待更新";
      return keepSign ? signedFixed(raw, digits, ` ${unit}`) : plainFixed(raw, digits, ` ${unit}`);
    }

    function trimmedFixed(value, maxDigits = 2, unit = "") {
      if (value === null || value === undefined || value === "") return "数据待更新";
      const number = Number(value);
      if (!Number.isFinite(number)) return String(value);
      return `${number.toLocaleString("zh-CN", { minimumFractionDigits: 0, maximumFractionDigits: maxDigits })}${unit}`;
    }

    function indiaWholesaleValue(metric) {
      if (!metric || metric.status !== "ok") return metric && metric.statusText ? metric.statusText : "数据待更新";
      const unit = metric.unit || "卢比/公担";
      const quintal = plainFixed(metric.priceInrPerQuintal, 2, ` ${unit}`);
      const kg = metric.priceInrPerKg === null || metric.priceInrPerKg === undefined ? "" : `（${plainFixed(metric.priceInrPerKg, 2, " 卢比/公斤")}）`;
      return `${quintal}${kg}`;
    }

    function indiaRetailValue(metric) {
      if (!metric || metric.status !== "ok") return metric && metric.statusText ? metric.statusText : "数据待更新";
      const unit = metric.unit || "卢比/公斤";
      return plainFixed(metric.priceInrPerKg, 2, ` ${unit}`);
    }

    function indiaUpExMillValue(metric) {
      if (!metric || metric.status !== "ok") return metric && metric.statusText ? metric.statusText : "数据待更新";
      const range = metric.rangeInrPerQuintal || {};
      const low = trimmedFixed(range.low, 2);
      const high = trimmedFixed(range.high, 2);
      const midpoint = trimmedFixed(metric.midpointInrPerQuintal, 2, " 卢比/公担");
      return `₹${low}—${high}/公担；区间中值 ${midpoint}`;
    }

    function metricDataDate(metric) {
      return metric && (metric.dataDate || metric.priceDate || metric.publishedDate) ? (metric.dataDate || metric.priceDate || metric.publishedDate) : "数据待更新";
    }

    function brazilDisplayDate(value, style = "iso") {
      if (!value) return "数据待更新";
      const match = String(value).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (match && style === "pt") return `${match[3]}/${match[2]}/${match[1]}`;
      return value;
    }

    function brazilMetricDataDate(metric, style = "iso") {
      const value = metric && (metric.referenceDate || metric.dataDate || metric.priceDate || metric.publishedDate);
      return brazilDisplayDate(value, style);
    }

    function indiaMetricFoot(metric) {
      const parts = [
        `数据日期：${metricDataDate(metric)}`,
      ];
      if (metric && metric.grade) parts.push(`等级：${metric.grade}`);
      if (metric && metric.priceBasis) parts.push(`口径：${metric.priceBasis}`);
      if (metric && Array.isArray(metric.citiesUsed) && metric.citiesUsed.length) {
        const count = metric.cityCount || metric.citiesUsed.length;
        parts.push(`城市样本：${metric.citiesUsed.join("、")}（${count}城）`);
      }
      if (metric && metric.includesGst === true) parts.push("GST口径：包含GST");
      if (metric && metric.includesGst === false) parts.push("GST口径：不含GST");
      if (metric && metric.rawUnit) parts.push(`原始单位：${metric.rawUnit}`);
      if (metric && metric.metricType === "upExMillPrice") parts.push("口径：北方邦M/30糖厂出厂价，涨跌按报价区间中值计算");
      if (metric && metric.yoyExactDateMatch === false) parts.push("同比：非完全同期");
      if (metric && metric.gstStatus) parts.push(`GST口径：${metric.gstStatus}`);
      if (metric && metric.note) parts.push(metric.note);
      return parts.join("；");
    }

    function buildBrazilMetricTable(config) {
      const metric = config.metric || {};
      const card = document.createElement("div");
      card.className = "brazil-metric-card";

      const title = document.createElement("h3");
      title.className = "brazil-metric-title";
      title.textContent = config.title;
      card.appendChild(title);

      const table = document.createElement("table");
      table.className = "brazil-metric-table";
      const thead = document.createElement("thead");
      const header = document.createElement("tr");
      ["字段", "绝对值", "（%）"].forEach(text => {
        const th = document.createElement("th");
        th.scope = "col";
        th.textContent = text;
        header.appendChild(th);
      });
      thead.appendChild(header);
      const tbody = document.createElement("tbody");
      table.appendChild(thead);
      table.appendChild(tbody);

      function appendValueRow(label, value) {
        const tr = document.createElement("tr");
        const th = document.createElement("th");
        th.scope = "row";
        th.textContent = label;
        const td = document.createElement("td");
        td.colSpan = 2;
        td.className = "brazil-metric-main";
        td.textContent = value;
        tr.append(th, td);
        tbody.appendChild(tr);
      }

      function appendChangeRow(label, changeValue, percentValue, digits, unit, transition = "", insufficientText = "") {
        const tr = document.createElement("tr");
        const th = document.createElement("th");
        th.scope = "row";
        th.textContent = label;
        const absTd = document.createElement("td");
        const pctTd = document.createElement("td");
        const cls = changeClass(changeValue);
        absTd.className = `metric-change ${cls}`;
        pctTd.className = `metric-change ${percentValue === null || percentValue === undefined ? "na" : cls}`;
        const hasChange = Number.isFinite(Number(changeValue));
        const hasPercent = Number.isFinite(Number(percentValue));
        if (hasChange) {
          const mainText = `${changeArrow(changeValue)}${signedFixed(changeValue, digits, unit ? ` ${unit}` : "")}`;
          absTd.textContent = transition ? `${mainText} ${transition}` : mainText;
        } else {
          absTd.textContent = insufficientText || "数据不足";
        }
        pctTd.textContent = hasPercent ? pctText(percentValue) : insufficientText || "不适用";
        tr.append(th, absTd, pctTd);
        tbody.appendChild(tr);
      }

      appendValueRow("取值", config.value());
      appendValueRow("数据日期", config.date());
      appendChangeRow(config.changeLabel || "日涨跌", config.changeValue(), config.changePercent(), config.digits, config.unit, config.transition ? config.transition() : "");
      appendChangeRow("同比", config.yoyValue(), config.yoyPercent(), config.digits, config.unit, config.yoyTransition ? config.yoyTransition() : "", config.yoyInsufficientText || "");

      const foot = document.createElement("div");
      foot.className = "brazil-metric-foot";
      const source = document.createElement("div");
      if (metric.sourceUrl && metric.sourceName) {
        const link = document.createElement("a");
        link.href = metric.sourceUrl;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = metric.sourceName;
        source.append("来源：", link);
      } else {
        source.textContent = "来源：数据待更新";
      }
      const meta = document.createElement("div");
      meta.textContent = config.footerMeta ? config.footerMeta(metric) : `数据日期：${brazilMetricDataDate(metric, config.dateStyle || "iso")}`;
      foot.append(source, meta);
      card.append(table, foot);
      return card;
    }

    function buildBrazilMetricsCard(metrics) {
      if (!metrics) return null;
      const card = document.createElement("div");
      card.className = "metric-card";
      const head = document.createElement("div");
      head.className = "metric-head";
      const title = document.createElement("h3");
      title.textContent = "巴西糖价与库存";
      const note = document.createElement("div");
      note.className = "metric-note";
      note.textContent = `数据日期：${metrics.dataDate || "数据待更新"}`;
      head.append(title, note);

      const grid = document.createElement("div");
      grid.className = "brazil-metric-grid";
      const premium = metrics.sugarPremium || {};
      const sugarStock = metrics.sugarStock || {};
      const ethanolStock = metrics.ethanolStock || {};
      grid.append(
        buildBrazilMetricTable({
          title: "巴西进口升贴水",
          metric: premium,
          digits: 2,
          unit: premium.unit || "美分/磅",
          changeLabel: "日涨跌",
          value: () => metricMainValue(premium, 2, premium.unit || "美分/磅", "premiumDiscountCentsPerLb", true),
          date: () => premium.dataDate || "数据待更新",
          changeValue: () => premium.dailyChange,
          changePercent: () => premium.dailyChangePercent,
          transition: () => signTransition(premium.previousValue, premium.premiumDiscountCentsPerLb),
          yoyValue: () => premium.yearOnYearChange,
          yoyPercent: () => premium.yearOnYearChangePercent,
          yoyTransition: () => signTransition(premium.previousYearValue, premium.premiumDiscountCentsPerLb),
        }),
        buildBrazilMetricTable({
          title: "巴西糖库存",
          metric: sugarStock,
          digits: 4,
          unit: sugarStock.stockUnit || "万吨",
          changeLabel: "半月变化",
          value: () => metricMainValue(sugarStock, 4, sugarStock.stockUnit || "万吨", "stockValue"),
          date: () => brazilMetricDataDate(sugarStock, "pt"),
          changeValue: () => sugarStock.halfMonthChange,
          changePercent: () => sugarStock.halfMonthChangePercent,
          yoyValue: () => sugarStock.yearOnYearChange,
          yoyPercent: () => sugarStock.yearOnYearChangePercent,
          dateStyle: "pt",
          footerMeta: metric => {
            return `数据日期：${brazilMetricDataDate(metric, "pt")}`;
          },
        }),
        buildBrazilMetricTable({
          title: "巴西含水乙醇库存",
          metric: ethanolStock,
          digits: 4,
          unit: ethanolStock.stockUnit || "万立方米",
          changeLabel: "半月变化",
          value: () => {
            const value = ethanolStock.stockTenThousandCubicMetres ?? ethanolStock.hydrousEthanolStock ?? ethanolStock.totalEthanolStock;
            if (value === null || value === undefined || value === "") return "数据待更新";
            return plainFixed(value, 4, ` ${ethanolStock.stockUnit || "万立方米"}`);
          },
          date: () => ethanolStock.referenceDate || ethanolStock.dataDate || "数据待更新",
          changeValue: () => ethanolStock.halfMonthChange,
          changePercent: () => ethanolStock.halfMonthChangePercent,
          yoyValue: () => ethanolStock.yearOnYearChange,
          yoyPercent: () => ethanolStock.yearOnYearChangePercent,
        })
      );

      card.append(head, grid);
      if (metrics.note) {
        const memo = document.createElement("div");
        memo.className = "metric-note";
        memo.style.marginTop = "8px";
        memo.textContent = metrics.note;
        card.appendChild(memo);
      }
      return card;
    }

    function buildIndiaMetricsCard(metrics) {
      if (!metrics) return null;
      const card = document.createElement("div");
      card.className = "metric-card";
      const head = document.createElement("div");
      head.className = "metric-head";
      const title = document.createElement("h3");
      title.textContent = "印度糖价";
      const note = document.createElement("div");
      note.className = "metric-note";
      note.textContent = `数据日期：${metrics.dataDate || "数据待更新"}`;
      head.append(title, note);

      const grid = document.createElement("div");
      grid.className = "brazil-metric-grid";
      const wholesale = metrics.domesticWholesalePrice || metrics.domesticSugarPrice || {};
      const retail = metrics.domesticRetailPrice || {};
      const upExMill = metrics.upExMillPrice || {};
      grid.append(
        buildBrazilMetricTable({
          title: "印度国内批发价",
          metric: wholesale,
          digits: 2,
          unit: "卢比/公担",
          changeLabel: "日涨跌",
          value: () => indiaWholesaleValue(wholesale),
          date: () => metricDataDate(wholesale),
          changeValue: () => wholesale.changeInrPerQuintal,
          changePercent: () => wholesale.changePct,
          yoyValue: () => wholesale.yearOnYearChangeInrPerQuintal,
          yoyPercent: () => wholesale.yearOnYearChangePct,
          yoyInsufficientText: "同比数据不足",
          footerMeta: indiaMetricFoot,
        }),
        buildBrazilMetricTable({
          title: "印度国内零售价",
          metric: retail,
          digits: 2,
          unit: "卢比/公斤",
          changeLabel: "日涨跌",
          value: () => indiaRetailValue(retail),
          date: () => metricDataDate(retail),
          changeValue: () => retail.changeInrPerKg,
          changePercent: () => retail.changePct,
          yoyValue: () => retail.yearOnYearChangeInrPerKg,
          yoyPercent: () => retail.yearOnYearChangePct,
          yoyInsufficientText: "同比数据不足",
          footerMeta: indiaMetricFoot,
        }),
        buildBrazilMetricTable({
          title: "北方邦糖厂出厂价",
          metric: upExMill,
          digits: 2,
          unit: "卢比/公担",
          changeLabel: "日涨跌",
          value: () => indiaUpExMillValue(upExMill),
          date: () => metricDataDate(upExMill),
          changeValue: () => upExMill.changeInrPerQuintal,
          changePercent: () => upExMill.changePct,
          yoyValue: () => upExMill.yearOnYearChangeInrPerQuintal,
          yoyPercent: () => upExMill.yearOnYearChangePct,
          yoyInsufficientText: "同比数据不足",
          footerMeta: indiaMetricFoot,
        })
      );

      card.append(head, grid);
      if (metrics.note) {
        const memo = document.createElement("div");
        memo.className = "metric-note";
        memo.style.marginTop = "8px";
        memo.textContent = metrics.note;
        card.appendChild(memo);
      }
      return card;
    }

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = "block";
    }

    function clearError() {
      errorEl.textContent = "";
      errorEl.style.display = "none";
    }

    async function loadJson(url) {
      const response = await fetch(fresh(url), { cache: "no-store" });
      if (!response.ok) throw new Error(`${url} ${response.status}`);
      return response.json();
    }

    async function renderReport(path) {
      const payload = await loadJson(path);
      currentPayload = payload;
      clearError();
      dateEl.textContent = `新闻日期：${cnDate(payload.newsDate)}`;
      updatedEl.textContent = `最后更新时间：${cnTime(payload.updatedAt)}（北京时间）`;
      contentEl.innerHTML = "";
      const displayCountries = (payload.countries || [])
        .filter(country => country.items && country.items.length);
      if (payload.brazilMetrics && !displayCountries.some(country => isBrazilCountry(country.country))) {
        displayCountries.unshift({ country: "巴西", items: [], metricsOnly: true });
      }
      if (payload.indiaMetrics && !displayCountries.some(country => country.country === "印度")) {
        const insertAt = displayCountries.findIndex(country => country.country === "泰国" || country.country === "中国");
        const indiaSection = { country: "印度", items: [], metricsOnly: true };
        if (insertAt === -1) displayCountries.push(indiaSection);
        else displayCountries.splice(insertAt, 0, indiaSection);
      }
      displayCountries.forEach(country => {
          const section = document.createElement("section");
          section.className = "country";
          const heading = document.createElement("h2");
          heading.textContent = country.country;
          const items = document.createElement("div");
          items.className = "items";
          section.appendChild(heading);
          if (isBrazilCountry(country.country)) {
            const metricsCard = buildBrazilMetricsCard(payload.brazilMetrics);
            if (metricsCard) section.appendChild(metricsCard);
          }
          if (country.country === "印度") {
            const metricsCard = buildIndiaMetricsCard(payload.indiaMetrics);
            if (metricsCard) section.appendChild(metricsCard);
          }
          country.items.forEach(item => {
            const article = document.createElement("article");
            const newsBox = document.createElement("div");
            const news = document.createElement("p");
            news.className = "news";
            news.textContent = item.news;
            const source = document.createElement("a");
            source.className = "source";
            source.href = item.sourceUrl;
            source.target = "_blank";
            source.rel = "noopener noreferrer";
            source.textContent = `来源：${item.sourceName}`;
            newsBox.append(news, source);
            const impact = document.createElement("div");
            impact.className = `impact ${impactClass(item.impactType)}`;
            const type = document.createElement("strong");
            type.textContent = item.impactType;
            const text = document.createElement("div");
            text.textContent = item.impact;
            impact.append(type, text);
            article.append(newsBox, impact);
            items.appendChild(article);
          });
          section.appendChild(items);
          contentEl.appendChild(section);
        });
    }

    function buildExportNode() {
      if (!currentPayload || !contentEl.children.length) {
        throw new Error("当前没有可导出的 Sugar News 报告。");
      }
      const node = document.createElement("div");
      node.className = "export-stage";

      const title = document.createElement("h1");
      title.className = "export-title";
      title.textContent = "Sugar News";

      const meta = document.createElement("div");
      meta.className = "export-meta";
      const newsDate = document.createElement("span");
      newsDate.textContent = `新闻日期：${cnDate(currentPayload.newsDate)}`;
      const updated = document.createElement("span");
      updated.textContent = `最后更新时间：${cnTime(currentPayload.updatedAt)}（北京时间）`;
      meta.append(newsDate, updated);

      const body = contentEl.cloneNode(true);
      node.append(title, meta, body);
      return node;
    }

    async function waitForFonts() {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
    }

    async function downloadReportImage() {
      if (downloadBtn.disabled) return;
      downloadBtn.disabled = true;
      downloadBtnText.textContent = "正在生成图片…";
      clearError();

      let exportNode;
      let pngUrl;
      try {
        if (!window.html2canvas) {
          throw new Error("图片导出组件加载失败，请刷新页面后重试。");
        }
        await waitForFonts();
        exportNode = buildExportNode();
        document.body.appendChild(exportNode);
        await new Promise(resolve => requestAnimationFrame(resolve));

        const width = Math.ceil(exportNode.scrollWidth);
        const height = Math.ceil(exportNode.scrollHeight);
        const scale = 2;
        const canvasWidth = width * scale;
        const canvasHeight = height * scale;
        const maxSide = 32767;
        const maxArea = 160000000;
        if (canvasWidth > maxSide || canvasHeight > maxSide || canvasWidth * canvasHeight > maxArea) {
          throw new Error("报告内容过长，图片尺寸超过当前浏览器限制，无法一次性完整导出。");
        }

        const canvas = await html2canvas(exportNode, {
          backgroundColor: "#ffffff",
          scale,
          width,
          height,
          windowWidth: width,
          windowHeight: height,
          scrollX: 0,
          scrollY: 0,
          useCORS: true,
          allowTaint: false,
          logging: false
        });

        const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
        if (!blob) throw new Error("PNG 文件生成失败，请更换浏览器后重试。");
        pngUrl = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = pngUrl;
        link.download = `sugar-news-${currentPayload.newsDate}.png`;
        document.body.appendChild(link);
        link.click();
        link.remove();
      } catch (error) {
        showError(error.message);
      } finally {
        if (exportNode) exportNode.remove();
        if (pngUrl) setTimeout(() => URL.revokeObjectURL(pngUrl), 1000);
        downloadBtn.disabled = false;
        downloadBtnText.textContent = "下载为图片";
      }
    }

    async function init() {
      try {
        const index = await loadJson(indexUrl);
        selectEl.innerHTML = "";
        index.reports.forEach(report => {
          const option = document.createElement("option");
          option.value = report.path;
          option.textContent = cnDate(report.newsDate);
          option.dataset.date = report.newsDate;
          selectEl.appendChild(option);
        });
        selectEl.addEventListener("change", () => renderReport(selectEl.value).catch(err => showError(err.message)));
        if (index.reports.length) {
          selectEl.value = index.reports[0].path;
          await renderReport(index.reports[0].path);
        }
        downloadBtn.addEventListener("click", () => downloadReportImage());
      } catch (error) {
        showError(`Sugar News 数据加载失败：${error.message}`);
      }
    }

    init();
  </script>
</body>
</html>
